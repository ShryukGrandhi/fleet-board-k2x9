<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fleet Analytics</title>
<style>
:root{
  --bg:#0a0a0c; --panel:#121217; --panel2:#16161d; --line:#23232c;
  --text:#ece9e6; --dim:#8c8a93; --accent:#e23b3b; --accent2:#b22; --good:#46c98b; --gold:#d9a441;
  --r:14px; --shadow:0 10px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#1a0d10 0%,var(--bg) 55%);
  color:var(--text);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1280px;margin:0 auto;padding:32px 22px 80px}
header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:28px}
h1{font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:clamp(28px,4vw,46px);
  letter-spacing:-.02em;margin:0;line-height:1}
h1 .accent{color:var(--accent)}
.sub{color:var(--dim);font-size:13px;margin-top:8px;letter-spacing:.02em}
.stamp{color:var(--dim);font-size:12px;text-align:right}
.stamp b{color:var(--text)}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:30px}
.kpi{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:var(--r);padding:18px 16px;position:relative;overflow:hidden}
.kpi:before{content:"";position:absolute;inset:0 auto auto 0;width:3px;height:100%;background:var(--accent);opacity:.7}
.kpi .v{font-size:clamp(20px,2.4vw,30px);font-weight:700;letter-spacing:-.01em}
.kpi .l{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
.section-t{font-family:Georgia,serif;font-size:20px;margin:34px 0 14px;letter-spacing:-.01em}
.trend{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:8px}
.trend svg{width:100%;height:90px;display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px;transition:.18s;cursor:pointer}
.card:hover{transform:translateY(-3px);border-color:#3a2326;box-shadow:var(--shadow)}
.card.active{border-color:var(--accent)}
.card .top{display:flex;align-items:center;gap:11px}
.card img{width:42px;height:42px;border-radius:50%;background:#222;object-fit:cover;border:1px solid var(--line)}
.card .nm{font-weight:600;font-size:15px;line-height:1.15}
.card .hd{color:var(--dim);font-size:11px}
.card .row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid var(--line);padding-top:11px}
.card .row .v{font-weight:700;font-size:16px}
.card .row .l{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
.bar{height:5px;border-radius:4px;background:#1d1d25;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:22px 0 12px}
.toolbar input{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:10px;
  padding:10px 14px;font-size:14px;min-width:240px;outline:none}
.toolbar input:focus{border-color:var(--accent)}
.chip{background:var(--panel);border:1px solid var(--line);color:var(--dim);border-radius:999px;
  padding:7px 13px;font-size:12px;cursor:pointer;white-space:nowrap}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden}
th,td{text-align:left;padding:11px 13px;font-size:13px;border-bottom:1px solid var(--line)}
th{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;user-select:none;
  position:sticky;top:0;background:var(--panel2)}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:#15151c}
td a{color:var(--text);text-decoration:none}
td a:hover{color:var(--accent)}
.vthumb{width:64px;height:38px;border-radius:6px;object-fit:cover;background:#1a1a20;border:1px solid var(--line)}
.muted{color:var(--dim)}
.pill{font-size:11px;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
.feed{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);max-height:240px;overflow:auto}
.feed .ev{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);font-size:13px}
.feed .ev:last-child{border-bottom:none}
.feed .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.feed .dot.post{background:var(--good)}.feed .dot.channel{background:var(--gold)}
.feed .ev .t{color:var(--dim);font-size:11px;margin-left:auto;white-space:nowrap}
.feed a{color:var(--text);text-decoration:none}.feed a:hover{color:var(--accent)}
@media(max-width:780px){.kpis{grid-template-columns:repeat(3,1fr)}.vthumb{display:none}}
</style>
</head>

<div class="wrap">
  <header>
    <div>
      <h1>Fleet <span class="accent">Analytics</span></h1>

  </table>
</div>

gpP6Fg8GJXNg", "url": "https://youtube.com/shorts/CXhvxOsetps", "n": 4, "cap": 6}, {"ts": "2026-06-21 21:58:01", "kind": "post", "channel": "Graveshift Tales", "cid": "UC6QCRNmAHPxgpP6Fg8GJXNg", "url": "https://youtube.com/shorts/Pli-j9ZJcUw", "n": 3, "cap": 6}, {"ts": "2026-06-21 21:56:43", "kind": "post", "channel": "Graveshift Tales", "cid": "UC6QCRNmAHPxgpP6Fg8GJXNg", "url": "https://youtube.com/shorts/Voy7Pa_pjPQ", "n": 2, "cap": 6}, {"ts": "2026-06-21 21:55:26", "kind": "post", "channel": "Graveshift Tales", "cid": "UC6QCRNmAHPxgpP6Fg8GJXNg", "url": "https://youtube.com/shorts/-wbaDWu_zQE", "n": 1, "cap": 6}]</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const HIST = JSON.parse(document.getElementById('hist').textContent);
const EVENTS = JSON.parse(document.getElementById('events').textContent);
const fmt = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':(''+n);
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
document.getElementById('stamp').textContent = DATA.generated_at;

// KPIs
const T = DATA.totals;
const kpis = [['Channels',T.channels],['Videos',T.videos],['Views',T.views],['Likes',T.likes],['Comments',T.comments],['Subscribers',T.subs]];
document.getElementById('kpis').innerHTML = kpis.map(([l,v])=>
  `<div class="kpi"><div class="v">${fmt(v)}</div><div class="l">${l}</div></div>`).join('');

// Live activity feed
(function(){
  const f=document.getElementById('feed');
  if(!EVENTS.length){f.innerHTML='<div class="ev muted" style="padding:16px">No activity yet — posts and new channels appear here.</div>';return;}
  f.innerHTML=EVENTS.map(e=>{
    if(e.kind==='post') return `<div class="ev"><span class="dot post"></span>
      <a href="${e.url}" target="_blank"><b>${esc(e.channel)}</b> posted ${e.n}/${e.cap}</a>
      <span class="t">${e.ts.slice(5,16)}</span></div>`;
    if(e.kind==='channel') return `<div class="ev"><span class="dot channel"></span>
      <a href="${e.url}" target="_blank">New channel <b>${esc(e.channel)}</b> (fleet ${e.fleet})</a>
      <span class="t">${e.ts.slice(5,16)}</span></div>`;
    return '';
  }).join('');
})();

// Trend line
(function(){
  const svg=document.getElementById('trend'); const pts=HIST.filter(p=>typeof p.views==='number');
  if(pts.length<2){svg.innerHTML='<text x="12" y="50" fill="#8c8a93" font-size="13">collecting data… trend appears after a few refreshes</text>';return;}
  const xs=pts.map((_,i)=>i/(pts.length-1)*1000);
  const max=Math.max(...pts.map(p=>p.views),1);
  const ys=pts.map(p=>88-(p.views/max)*80);
  let d='M'+xs[0]+' '+ys[0]; for(let i=1;i<xs.length;i++)d+=' L'+xs[i]+' '+ys[i];
  const area=d+` L1000 90 L0 90 Z`;
  svg.innerHTML=`<defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#e23b3b" stop-opacity=".35"/><stop offset="1" stop-color="#e23b3b" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g)"/><path d="${d}" fill="none" stroke="#e23b3b" stroke-width="2"/>`;
})();

// Channel cards
const maxV = Math.max(...DATA.channels.map(c=>c.liveViews||0),1);
let activeChannel = null;
function renderCards(){
  document.getElementById('cards').innerHTML = DATA.channels
    .slice().sort((a,b)=>(b.liveViews||0)-(a.liveViews||0))
    .map(c=>`<div class="card ${activeChannel===c.id?'active':''}" data-id="${c.id}">
      <div class="top">
        <img src="${c.thumb||''}" onerror="this.style.visibility='hidden'">
        <div><div class="nm">${esc(c.title)}</div><div class="hd">${esc(c.handle||'')}</div></div>
      </div>
      <div class="bar"><i style="width:${Math.max(3,(c.liveViews||0)/maxV*100)}%"></i></div>
      <div class="row">
        <div><div class="v">${fmt(c.liveViews||0)}</div><div class="l">Views</div></div>
        <div><div class="v">${fmt((c.videos||[]).length)}</div><div class="l">Videos</div></div>
        <div><div class="v">${fmt(c.subs||0)}</div><div class="l">Subs</div></div>
      </div></div>`).join('');
  document.querySelectorAll('.card').forEach(el=>el.onclick=()=>{
    activeChannel = activeChannel===el.dataset.id?null:el.dataset.id; renderCards(); renderChips(); renderTable();});
}

// Flatten videos
const VIDS = [];
DATA.channels.forEach(c=>(c.videos||[]).forEach(v=>VIDS.push({...v, channel:c.title, cid:c.id})));

// Channel filter chips
function renderChips(){
  const chips=[['All',null]].concat(DATA.channels.map(c=>[c.title,c.id]));
  document.getElementById('chips').innerHTML = chips.map(([n,id])=>
    `<span class="chip ${activeChannel===id?'active':''}" data-id="${id===null?'':id}">${esc(n)}</span>`).join('');
  document.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{
    activeChannel = el.dataset.id||null; renderCards(); renderChips(); renderTable();});
}

// Sortable table
let sortKey='views', sortDir=-1;
function renderTable(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let rows=VIDS.filter(v=>(!activeChannel||v.cid===activeChannel) &&
    (!q || v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q)));
  rows.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];
    if(sortKey==='title'||sortKey==='channel'||sortKey==='publishedAt'){x=''+x;y=''+y;return x<y?-sortDir:x>y?sortDir:0;}
    return (x-y)*sortDir;});
  document.getElementById('vbody').innerHTML = rows.map(v=>`<tr>
    <td>${v.thumb?`<img class="vthumb" src="${v.thumb}">`:''}</td>
    <td><a href="https://youtube.com/shorts/${v.id}" target="_blank">${esc(v.title)}</a></td>
    <td class="muted">${esc(v.channel)}</td>
    <td class="num">${fmt(v.views)}</td>
    <td class="num">${fmt(v.likes)}</td>
    <td class="num">${fmt(v.comments)}</td>
    <td class="muted">${v.publishedAt.slice(0,10)}</td></tr>`).join('')
    || `<tr><td colspan="7" class="muted" style="padding:24px">No videos yet.</td></tr>`;
}
document.querySelectorAll('th[data-k]').forEach(th=>{const k=th.dataset.k; if(!k||k==='thumb')return;
  th.onclick=()=>{if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='title'||k==='channel')?1:-1;}renderTable();};});
document.getElementById('search').oninput=renderTable;

renderCards(); renderChips(); renderTable();
</script>
